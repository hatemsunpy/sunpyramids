version: "3.0.0"

swarm:
  topology: hierarchical
  maxAgents: 5
  autoScale: false
  coordinationStrategy: consensus

memory:
  backend: hybrid
  enableHNSW: false
  persistPath: .claude-flow/data
  cacheSize: 20
  # ADR-049: Self-Learning Memory
  learningBridge:
    enabled: false
    sonaMode: balanced
    confidenceDecayRate: 0.005
    accessBoostAmount: 0.03
    consolidationThreshold: 3
  memoryGraph:
    enabled: false
    pageRankDamping: 0.85
    maxNodes: 500
    similarityThreshold: 0.8
  agentScopes:
    enabled: false
    defaultScope: project

neural:
  enabled: false
  modelPath: .claude-flow/neural

hooks:
  enabled: true
  autoExecute: false

mcp:
  autoStart: false
  port: 3000
